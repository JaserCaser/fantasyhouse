	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>Apple 登录</title>
	    <style>
	        /* 全局重置与基础样式 */
	        * {
	            margin: 0;
	            padding: 0;
	            box-sizing: border-box;
	        }
	        body {
	            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
	            background-color: #f5f5f7;
	            color: #1d1d1f;
	            display: flex;
	            justify-content: center;
	            align-items: center;
	            min-height: 100vh;
	            -webkit-font-smoothing: antialiased;
	        }
	        /* 登录容器 */
	        .login-container {
	            background-color: #ffffff;
	            width: 100%;
	            max-width: 420px;
	            padding: 40px 32px;
	            border-radius: 16px;
	            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
	        }
	        /* Logo */
	        .logo {
	            text-align: center;
	            margin-bottom: 24px;
	        }
	        .logo svg {
	            width: 40px;
	            height: 40px;
	            fill: #1d1d1f;
	        }
	        /* 标题 */
	        h2 {
	            text-align: center;
	            font-size: 22px;
	            font-weight: 600;
	            margin-bottom: 8px;
	            letter-spacing: -0.01em;
	        }
	        .subtitle {
	            text-align: center;
	            font-size: 14px;
	            color: #86868b;
	            margin-bottom: 28px;
	        }
	        /* 表单样式 */
	        .form-group {
	            margin-bottom: 16px;
	            position: relative;
	        }
	        input {
	            width: 100%;
	            padding: 14px 16px;
	            font-size: 17px;
	            border: 1px solid #d2d2d7;
	            border-radius: 10px;
	            outline: none;
	            transition: border-color 0.2s ease, box-shadow 0.2s ease;
	            background-color: #fff;
	            color: #1d1d1f;
	        }
	        input::placeholder {
	            color: #86868b;
	        }
	        input:focus {
	            border-color: #0071e3;
	            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2);
	        }
	        /* 登录按钮 */
	        .btn-login {
	            width: 100%;
	            padding: 14px;
	            background-color: #0071e3;
	            color: #ffffff;
	            border: none;
	            border-radius: 10px;
	            font-size: 17px;
	            font-weight: 500;
	            cursor: pointer;
	            transition: background-color 0.2s ease;
	            margin-top: 8px;
	        }
	        .btn-login:hover {
	            background-color: #0077ed;
	        }
	        .btn-login:active {
	            background-color: #006edb;
	        }
	        /* 底部链接 */
	        .footer-links {
	            margin-top: 24px;
	            text-align: center;
	            font-size: 14px;
	        }
	        .footer-links a {
	            color: #0066cc;
	            text-decoration: none;
	            transition: color 0.2s ease;
	        }
	        .footer-links a:hover {
	            text-decoration: underline;
	        }
	        .divider {
	            margin: 0 8px;
	            color: #d2d2d7;
	        }
	        /* 保持登录复选框 */
	        .keep-logged-in {
	            display: flex;
	            align-items: center;
	            margin-top: 16px;
	            font-size: 14px;
	            color: #86868b;
	        }
	        .keep-logged-in input[type="checkbox"] {
	            width: 16px;
	            height: 16px;
	            margin-right: 8px;
	            accent-color: #0071e3;
	            cursor: pointer;
	        }
	    </style>
	</head>
	<body>
	    <div class="login-container">
	        <!-- Apple Logo SVG -->
	        <div class="logo">
	            <svg viewBox="0 0 17 48" xmlns="http://www.w3.org/2000/svg">
	                <path d="M15.5 23.4c0-3.8 3.1-5.6 3.3-5.7-1.8-2.6-4.5-3-5.5-3-2.4-.2-4.6 1.4-5.8 1.4-1.2 0-3-1.3-5-1.3-2.5 0-4.9 1.5-6.2 3.8-2.7 4.6-.7 11.4 1.9 15.1 1.3 1.8 2.8 3.8 4.8 3.7 1.9-.1 2.6-1.2 4.9-1.2s2.9 1.2 4.9 1.2c2 0 3.3-1.8 4.5-3.6 1.4-2 2-4 2.1-4.1-.1-.1-4-1.5-4-6.1zm-3.7-11.2c1-1.3 1.7-3 1.6-4.8-1.5.1-3.4 1-4.5 2.3-1 1.1-1.8 2.9-1.6 4.6 1.7.1 3.5-.9 4.5-2.1z" transform="translate(0, 8) scale(1.2)"/>
	            </svg>
	        </div>
	        <h2>使用 Apple 账户登录</h2>
	        <p class="subtitle">管理你的账户并访问各项 Apple 服务</p>
	        <form id="loginForm">
	            <div class="form-group">
	                <input type="email" id="appleId" placeholder="Apple 账户（电子邮件或电话号码）" required autocomplete="email">
	            </div>
	            <div class="form-group">
	                <input type="password" id="password" placeholder="密码" required autocomplete="current-password">
	            </div>
	            <div class="keep-logged-in">
	                <input type="checkbox" id="keepLoggedIn" checked>
	                <label for="keepLoggedIn">让我保持登录状态</label>
	            </div>
	            <button type="submit" class="btn-login">登录</button>
	        </form>
	        <div class="footer-links">
	            <a href="#">忘记 Apple 账户或密码？</a>
	            <span class="divider">|</span>
	            <a href="#">创建你的 Apple 账户</a>
	        </div>
	    </div>
	    <script>
	        document.getElementById('loginForm').addEventListener('submit', function(event) {
	            event.preventDefault();
	            const appleId = document.getElementById('appleId').value;
	            const password = document.getElementById('password').value;
	            if(appleId && password) {
	                // 模拟登录动画
	                const btn = document.querySelector('.btn-login');
	                btn.textContent = '正在登录...';
	                btn.style.backgroundColor = '#e2e2e7';
	                btn.style.color = '#86868b';
	                btn.disabled = true;
	                setTimeout(() => {
	                    alert('登录请求已发送（此为演示界面）');
	                    btn.textContent = '登录';
	                    btn.style.backgroundColor = '#0071e3';
	                    btn.style.color = '#ffffff';
	                    btn.disabled = false;
	                }, 1500);
	            }
	        });
	    </script>
	</body>
