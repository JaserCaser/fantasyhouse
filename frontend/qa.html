<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库智能问答</title>
  <style>
    :root {
      --color-bg: #fafaf8;
      --color-bg-secondary: #f2f0ed;
      --color-bg-card: #ffffff;
      --color-text-primary: #2c2c2a;
      --color-text-secondary: #7a7872;
      --color-text-tertiary: #a8a6a0;
      --color-text-inverse: #ffffff;
      --color-brand: #2563a8;
      --color-brand-hover: #3b7dd8;
      --color-brand-light: #f0f4f8;
      --color-border: rgba(0,0,0,0.07);
      --color-border-light: rgba(0,0,0,0.04);
      --color-border-strong: rgba(0,0,0,0.12);
      --color-danger: #e04438;
      --color-user-bubble: #2563a8;
      --color-ai-bubble: #ffffff;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
      --radius: 20px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    [data-theme="dark"] {
      --color-bg: #141412;
      --color-bg-secondary: #1e1e1a;
      --color-bg-card: #222220;
      --color-text-primary: #e8e6e1;
      --color-text-secondary: #9a9890;
      --color-text-tertiary: #6a6862;
      --color-text-inverse: #141412;
      --color-brand: #4a9ae0;
      --color-brand-hover: #6bb3f0;
      --color-brand-light: #1e2a36;
      --color-border: rgba(255,255,255,0.07);
      --color-border-light: rgba(255,255,255,0.04);
      --color-border-strong: rgba(255,255,255,0.12);
      --color-danger: #f06050;
      --color-user-bubble: #1e3a58;
      --color-ai-bubble: #222220;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, "SF Pro Display", "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--color-text-primary);
      background: var(--color-bg);
    }

    body {
      opacity: 0;
      animation: pageIn 0.4s var(--ease-spring) forwards;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Layout */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--color-border-strong);
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      transform: translateY(-1px);
    }

    .back-btn svg { width: 14px; height: 14px; fill: currentColor; }

    .header-center {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
    }

    .model-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--color-brand-light);
      color: var(--color-brand);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .model-chip.no-model {
      background: var(--color-bg-secondary);
      color: var(--color-text-tertiary);
    }

    .clear-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--color-border-strong);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .clear-btn:hover {
      background: var(--color-bg-secondary);
      color: var(--color-danger);
      border-color: var(--color-danger);
    }

    .clear-btn.hidden { visibility: hidden; }

    /* Messages Area */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      scroll-behavior: smooth;
    }

    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 2px; }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px 40px;
      gap: 16px;
    }

    .welcome-emoji { font-size: 52px; margin-bottom: 4px; }
    .welcome h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    .welcome p { font-size: 15px; color: var(--color-text-secondary); max-width: 400px; line-height: 1.6; }

    .welcome-tips {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
      width: 100%;
      max-width: 400px;
    }

    .tip {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      background: var(--color-bg-secondary);
      font-size: 13px;
      color: var(--color-text-secondary);
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .tip:hover {
      background: var(--color-brand-light);
      color: var(--color-brand);
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      animation: msgIn 0.25s var(--ease-spring);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* User message */
    .msg-user {
      flex-direction: row-reverse;
    }

    .msg-user .msg-bubble {
      background: var(--color-user-bubble);
      color: #ffffff;
      border-radius: 18px 4px 18px 18px;
      padding: 12px 16px;
      max-width: 75%;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    [data-theme="dark"] .msg-user .msg-bubble {
      background: #1d4a80;
    }

    /* AI message */
    .msg-ai {
      align-items: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-brand), var(--color-brand-hover));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(37,99,168,0.25);
    }

    .msg-body {
      flex: 1;
      min-width: 0;
    }

    .msg-bubble-ai {
      background: var(--color-ai-bubble);
      border: 1px solid var(--color-border);
      border-radius: 4px 18px 18px 18px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.75;
      box-shadow: var(--shadow-card);
      max-width: 90%;
    }

    /* Markdown content */
    .msg-content h1, .msg-content h2, .msg-content h3 {
      margin: 12px 0 6px;
      font-weight: 600;
      line-height: 1.3;
    }
    .msg-content h1 { font-size: 18px; }
    .msg-content h2 { font-size: 16px; }
    .msg-content h3 { font-size: 14px; }
    .msg-content p { margin: 6px 0; }
    .msg-content ul, .msg-content ol { padding-left: 20px; margin: 6px 0; }
    .msg-content li { margin: 3px 0; }
    .msg-content code {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    }
    .msg-content pre {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
    }
    .msg-content blockquote {
      border-left: 3px solid var(--color-brand);
      padding-left: 12px;
      color: var(--color-text-secondary);
      margin: 8px 0;
    }
    .msg-content strong { font-weight: 600; }
    .msg-content a { color: var(--color-brand); text-decoration: none; }
    .msg-content a:hover { text-decoration: underline; }
    .msg-content table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .msg-content th, .msg-content td { border: 1px solid var(--color-border-strong); padding: 6px 10px; text-align: left; }
    .msg-content th { background: var(--color-bg-secondary); font-weight: 600; }

    /* Sources */
    .msg-sources {
      margin-top: 10px;
      border-top: 1px dashed var(--color-border);
      padding-top: 10px;
    }

    .sources-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .source-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--color-bg-secondary);
      margin-bottom: 6px;
      font-size: 12px;
      cursor: default;
      transition: background 0.15s ease;
    }

    .source-item:last-child { margin-bottom: 0; }
    .source-item:hover { background: var(--color-brand-light); }

    .source-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

    .source-info { flex: 1; min-width: 0; }
    .source-name {
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-snip {
      color: var(--color-text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-text-tertiary);
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Streaming cursor */
    .streaming-cursor::after {
      content: "▋";
      display: inline;
      animation: blink 0.8s step-end infinite;
      color: var(--color-brand);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Searching indicator */
    .searching-text {
      font-size: 13px;
      color: var(--color-text-tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .searching-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid var(--color-border-strong);
      border-top-color: var(--color-brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .msg-error {
      font-size: 13px;
      color: var(--color-danger);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--color-border);
      padding: 16px 20px;
      background: var(--color-bg);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .file-bind-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .file-bind-label {
      font-size: 12px;
      color: var(--color-text-secondary);
      flex-shrink: 0;
    }

    .file-bind-select {
      flex: 1;
      height: 34px;
      border: 1px solid var(--color-border-strong);
      border-radius: 8px;
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      font-size: 12px;
      padding: 0 10px;
      outline: none;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    textarea#questionInput {
      width: 100%;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      font-size: 14px;
      font-family: inherit;
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      line-height: 1.6;
      overflow-y: auto;
    }

    textarea#questionInput:focus {
      border-color: var(--color-brand);
      box-shadow: 0 0 0 3px rgba(37,99,168,0.12);
    }

    [data-theme="dark"] textarea#questionInput:focus {
      box-shadow: 0 0 0 3px rgba(74,154,224,0.15);
    }

    textarea#questionInput::placeholder { color: var(--color-text-tertiary); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, var(--color-brand), var(--color-brand-hover));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 2px 8px rgba(37,99,168,0.3);
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(37,99,168,0.4);
    }

    .send-btn:active:not(:disabled) { transform: translateY(0); }

    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .send-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .input-hint {
      margin-top: 8px;
      font-size: 11px;
      color: var(--color-text-tertiary);
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .chat-header { padding: 10px 14px; }
      .header-title { display: none; }
      .messages-area { padding: 16px 14px; }
      .input-area { padding: 12px 14px; }
      .model-chip { max-width: 120px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Header -->
    <header class="chat-header">
      <button class="back-btn" id="backBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 1 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/></svg>
        返回
      </button>

      <div class="header-center">
        <span class="header-title">知识库智能问答</span>
        <span class="model-chip no-model" id="modelChip">加载中…</span>
      </div>

      <button class="clear-btn hidden" id="clearBtn" type="button">清空对话</button>
    </header>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea">
      <div class="welcome" id="welcome">
        <div class="welcome-emoji">🤖</div>
        <h2>知识库智能问答</h2>
        <p>基于您的私有文件库，为您提供精准的上下文检索式回答，支持多轮对话。</p>
        <div class="welcome-tips">
          <div class="tip" data-q="请帮我总结一下知识库里的主要内容">💡 请帮我总结一下知识库里的主要内容</div>
          <div class="tip" data-q="这个项目的权限控制是怎么做的？">🔐 这个项目的权限控制是怎么做的？</div>
          <div class="tip" data-q="请列举知识库中涉及的核心概念">📚 请列举知识库中涉及的核心概念</div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="file-bind-row">
        <span class="file-bind-label">关联文件</span>
        <select id="fileBindSelect" class="file-bind-select">
          <option value="">全部文件（自动检索）</option>
        </select>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="questionInput" placeholder="问我任何问题…" rows="1"></textarea>
        </div>
        <button class="send-btn" id="askBtn" type="button" title="发送 (Ctrl+Enter)">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-hint">Ctrl / Cmd + Enter 发送 · 支持多轮追问</div>
    </div>
  </div>

  <script>
    const savedTheme = localStorage.getItem('kb_theme') || 'auto';
    const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme',
      savedTheme === 'auto' ? (systemDark ? 'dark' : 'light') : savedTheme);
  </script>
  <script src="/marked.min.js"></script>
  <script src="/qa.js"></script>
</body>
</html>
